limit_req_zone $binary_remote_addr zone=anti_bot:10m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    server_name kuban-govnovoz.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kuban-govnovoz.space;

    ssl_certificate     /etc/letsencrypt/live/kuban-govnovoz.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuban-govnovoz.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    location / {
        limit_req zone=anti_bot burst=10 nodelay;
        root /usr/share/nginx/html;
        index index.html;
    }
}

server {
    listen 8080;
    server_name localhost;

    location /metrics {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }
}
