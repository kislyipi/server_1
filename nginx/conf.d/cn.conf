server {
    listen 80;
    server_name kuban-govnovoz.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://\$host\$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kuban-govnovoz.space;

    ssl_certificate     /etc/letsencrypt/live/kuban-govnovoz.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuban-govnovoz.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}