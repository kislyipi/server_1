name: server deployment

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/**'
      - '.cd_exclude/**'
  schedule:
    - cron: '0 0 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Detect changed files
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          nginx: 'nginx/**'
          prometheus: 'prometheus/**'
          compose: 'docker-compose.yaml'

    - name: Check if validation needed
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "need_validation=true" >> $GITHUB_OUTPUT
        elif [[ "${{ steps.filter.outputs.nginx }}" == "true" || "${{ steps.filter.outputs.prometheus }}" == "true" || "${{ steps.filter.outputs.compose }}" == "true" ]]; then
          echo "need_validation=true" >> $GITHUB_OUTPUT
        else
          echo "need_validation=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate test SSL certificates
      if: steps.check.outputs.need_validation == 'true'
      run: |
        mkdir -p ./certbot/conf/live/kuban-govnovoz.space
        openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
          -keyout ./certbot/conf/live/kuban-govnovoz.space/privkey.pem \
          -out ./certbot/conf/live/kuban-govnovoz.space/fullchain.pem \
          -subj "/CN=localhost"

    - name: Login to Docker Hub
      if: steps.check.outputs.need_validation == 'true'
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Start test environment
      if: steps.check.outputs.need_validation == 'true'
      run: docker compose up -d

    - name: Scan images for vulnerabilities
      if: steps.check.outputs.need_validation == 'true' && (github.event_name == 'schedule' || steps.filter.outputs.compose == 'true')
      run: |
        for id in $(docker compose images -q); do
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd)/cd_exclude/.trivyignore:/.trivyignore \
            aquasec/trivy image \
            --ignorefile /.trivyignore \
            --quiet \
            --severity CRITICAL \
            --ignore-unfixed \
            --vuln-type library \
            --exit-code 1 \
            $id
        done

    - name: Wait for nginx to be ready
      if: steps.check.outputs.need_validation == 'true'
      run: |
        for i in {1..10}; do
          curl -sfk https://localhost && break || sleep 2
        done

    - name: Validate nginx configuration
      if: steps.check.outputs.need_validation == 'true' && (github.event_name == 'schedule' || steps.filter.outputs.nginx == 'true')
      run: |
        curl -fkI https://localhost | grep -q "200 OK"
        docker compose exec nginx nginx -t

    - name: Validate Docker Compose file
      if: steps.check.outputs.need_validation == 'true' && (github.event_name == 'schedule' || steps.filter.outputs.compose == 'true')
      run: docker compose config -q

    - name: Validate Prometheus config
      if: steps.check.outputs.need_validation == 'true' && (github.event_name == 'schedule' || steps.filter.outputs.prometheus == 'true')
      run: |
        docker run --rm -v $(pwd)/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
          --entrypoint promtool prom/prometheus check config /etc/prometheus/prometheus.yml

    - name: Stop test environment
      if: steps.check.outputs.need_validation == 'true'
      run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy files to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: ".,!cd_exclude/**,!certbot/**,!Dockerfile,!.github/**"
        target: "/home/${{ secrets.SSH_USER }}/test-site"

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/${{ secrets.SSH_USER }}/test-site
          docker compose down --remove-orphans
          docker compose pull
          docker compose up -d --force-recreate