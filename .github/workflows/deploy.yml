name: server deployment

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate test SSL certificates
      run: |
        mkdir -p ./certbot/conf/live/kuban-govnovoz.space
        openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
          -keyout ./certbot/conf/live/kuban-govnovoz.space/privkey.pem \
          -out ./certbot/conf/live/kuban-govnovoz.space/fullchain.pem \
          -subj "/CN=localhost"

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Start test environment
      run: docker compose up -d

    - name: Scan images for vulnerabilities
      run: |
        for id in $(docker compose images -q); do
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd)/cd_exclude/.trivyignore:/.trivyignore \
            aquasec/trivy image \
            --ignorefile /.trivyignore \
            --quiet \
            --severity CRITICAL \
            --ignore-unfixed \
            --vuln-type library \
            --exit-code 1 \
            $id
        done

    - name: Wait for nginx to be ready
      run: |
        for i in {1..10}; do
          curl -sfk https://localhost && break || sleep 2
        done

    - name: Validate nginx configuration
      run: |
        curl -fkI https://localhost | grep -q "200 OK"
        docker compose exec nginx nginx -t

    - name: Validate Docker Compose file
      run: |
        docker compose config -q

    - name: Validate Prometheus config
      run: |
        docker run --rm -v $(pwd)/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
          --entrypoint promtool prom/prometheus check config /etc/prometheus/prometheus.yml

    - name: Stop test environment
      run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy files to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: ".,!cd_exclude/**,!certbot/**,!Dockerfile"
        target: "/home/${{ secrets.SSH_USER }}/test-site"

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/${{ secrets.SSH_USER }}/test-site
          docker compose down --remove-orphans
          docker compose pull
          docker compose up -d --force-recreate