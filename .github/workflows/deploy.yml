name: server deployment

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate test SSL certificates
      run: |
        mkdir -p ./certbot/conf/live/kuban-govnovoz.space
        openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
          -keyout ./certbot/conf/live/kuban-govnovoz.space/privkey.pem \
          -out ./certbot/conf/live/kuban-govnovoz.space/fullchain.pem \
          -subj "/CN=localhost"

    - name: Start test environment
      run: docker compose up -d

    - name: Wait for nginx to be ready
      run: |
        for i in {1..10}; do
          curl -sfk https://localhost && break || sleep 2
        done

    - name: Validate nginx configuration
      run: |
        curl -fkI https://localhost | grep -q "200 OK"
        docker compose exec nginx nginx -t

    - name: Validate Docker Compose file
      run: |
        docker compose config -q
        echo "Docker Compose file is valid!"

    - name: Validate Prometheus config
      run: |
        docker run --rm -v $(pwd)/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
          --entrypoint promtool prom/prometheus check config /etc/prometheus/prometheus.yml
        echo "Prometheus config is valid!"

    - name: Stop test environment
      run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy files to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: ".,!cd_exclude/**,!certbot/**,!.git"
        target: "/home/${{ secrets.SSH_USER }}/test-site"
        overwrite: true

    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/${{ secrets.SSH_USER }}/test-site
          ls -la
          docker --version
          docker compose version
          docker compose down --remove-orphans
          docker compose pull
          docker compose up -d --force-recreate