name: Deploy Gay Server

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Validate Docker Compose file
      run: |
        docker compose config -q
        echo "Docker Compose file is valid!"

        docker compose run --entrypoint "nginx -t" --rm nginx
        echo "Nginx config is valid!"

        docker run --rm -v $(pwd)/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
          prom/prometheus promtool check config /etc/prometheus/prometheus.yml
        echo "Prometheus config is valid!"

        echo "ВСЕ КОНФИГУРАЦИИ ИДЕАЛЬНЫ!"

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy files to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: ".,!cd_exclude/**"
        target: "/home/${{ secrets.SSH_USER }}/test-site"

    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/${{ secrets.SSH_USER }}/test-site
          docker compose pull
          docker compose up -d --remove-orphans